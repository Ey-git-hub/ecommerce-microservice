version: '3.8'

services:
  app:
    build: .
    container_name: spring-user-service
    ports:
      - "8080:8080"
    environment:
      # Replace this host with your actual Neon endpoint host
      SPRING_DATASOURCE_URL: jdbc:postgresql://ep-rough-scene-zamrnv5o-pooler.c-2.eu-west-2.aws.neon.tech/neondb?sslmode=require
      SPRING_DATASOURCE_USERNAME: your_neon_username
      SPRING_DATASOURCE_PASSWORD: your_neon_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      # Keep connection lifetime short for Neon serverless pooler
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: 60000
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: 30000